<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chaos Book List</title>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap');

        :root {
            /* PRIMITIVES */
            --color-brown-dark:   #3d2409;
            --color-brown-medium: #6b4523;
            --color-gold:         #c4993f;
            --color-gold-light:   #e2c97e;
            --color-parchment:    #f5ead8;
            --color-red:          #c0392b;
            --color-black:        #0b0806;
            --color-gray-dark:    #131008;
            --color-gray-medium:  #1a1510;
            --color-gray-light:   #2e2518;
            --color-gray-lighter: #8a7a66;
            --color-white:        #ffffff;
            --color-white-dim:    #e8ddd0;

            /* TOKENS */
            --bg-page:        var(--color-gray-medium);
            --bg-card:        transparent;
            --bg-featured:    var(--color-parchment);
            --bg-ui:          var(--color-gray-dark);
            --bg-panel:       #fdf9f3;
            --bg-overlay:     rgba(61, 36, 9, 0.88);

            --text-primary:   var(--color-parchment);
            --text-inverted:  var(--color-gray-medium);
            --text-accent:    var(--color-gold-light);
            --text-panel:     var(--color-gray-medium);

            --border-ui:      var(--color-brown-dark);
            --border-light:   #ddd5c4;

            --shadow-retro:   10px 10px 0px rgba(61, 36, 9, 0.2);
            --shadow-panel:   -5px 0 30px rgba(0,0,0,0.2);
            --shadow-card:    0 10px 20px rgba(0,0,0,0.15);
        }

        * { box-sizing: border-box; }

        body {
            background-color: var(--bg-page);
            color: var(--text-primary);
            font-family: "Outfit", sans-serif;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            width: 100%;
        }

        body.panel-open { overflow: hidden; }

        /* --- HEADER & NAV --- */
        .top-nav {
            display: flex;
            justify-content: flex-end;
            padding: 20px 5%;
            max-width: 1600px;
            margin: 0 auto;
        }

        .nav-link {
            color: var(--text-primary);
            text-transform: uppercase;
            font-family: 'Playfair Display', serif;
            font-weight: 300;
            font-style: italic;
            letter-spacing: 1px;
            border-bottom: 2px solid transparent;
            transition: 0.2s;
            text-decoration: none;
        }
        .nav-link:hover { border-bottom-color: var(--text-primary); }

        header {
            text-align: left;
            padding: 2rem 0 3rem;
            width: 90%;
            max-width: 1600px;
            margin: 0 auto;
        }

        h1 a {
            color: inherit;
            text-decoration: none;
        }
        h1 a:hover { opacity: 0.75; }

        h1 {
            font-family: 'Playfair Display', serif;
            font-weight: 300;
            letter-spacing: -2px;
            margin: 0 0 10px 0;
            font-size: clamp(2rem, 6vw, 2.2rem);
        }

        /* --- FEATURED SECTION --- */
        .featured-wrapper {
            max-width: 1600px;
            margin: 40px auto 100px auto;
            width: 90%;
            background-color: var(--bg-featured);
            padding: 50px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            color: var(--text-inverted);
        }

        .label-recent {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 1.5rem;
            margin-bottom: 30px;
            border-bottom: 1px groove var(--border-ui);
            display: inline-block;
            padding-bottom: 5px;
        }

        .featured-content { display: flex; gap: 50px; align-items: center; }
        .featured-cover {
            flex-shrink: 0; width: 11rem; overflow: hidden;
            box-shadow: var(--shadow-retro); transform: rotate(-2deg);
        }
        .featured-cover img { width: 100%; height: auto; display: block; }
        .featured-cover-placeholder {
            flex-shrink: 0; width: 11rem; aspect-ratio: 2/3;
            background: var(--color-parchment);
            border: 2px dashed var(--color-brown-medium);
            display: flex; align-items: center; justify-content: center;
            font-size: 2rem; color: var(--color-brown-medium);
            box-shadow: var(--shadow-retro); transform: rotate(-2deg);
        }
        .f-date { font-family: 'Outfit', sans-serif; font-size: 1rem; margin-bottom: 20px; display: inline-block; padding: 2px 10px; }
        .f-title { font-family: 'Playfair Display', serif; font-size: 2.5rem; line-height: 1.1; margin: 0 0 6px 0; font-style: italic; }
        .f-author { font-family: 'Outfit', sans-serif; font-size: 1.05rem; margin-bottom: 6px; opacity: 0.7; }
        .f-rating { font-family: 'Outfit', sans-serif; font-size: 1rem; margin-bottom: 14px; display: inline-block; opacity: 0.8; }
        .f-notes {
            max-width: 720px;
            font-family: 'Playfair Display', serif; font-size: 1.1rem; line-height: 1.6;
            position: relative; padding-left: 20px; border-left: 2px solid var(--color-brown-dark);
        }

        /* --- YEAR TABS --- */
        .tabs-container {
            display: flex;
            overflow-x: auto;
            padding: 0;
            margin-bottom: 0;
            max-width: 90%;
            align-items: flex-end;
        }
        .tabs-container::-webkit-scrollbar { display: none; }

        .tab-btn {
            background: transparent;
            border: 1px solid var(--border-ui);
            color: var(--text-primary);
            padding: 6px 15px;
            font-family: 'Outfit', sans-serif;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 300;
            cursor: pointer;
            opacity: 0.6;
            transition: all 0.2s;
            border-color: transparent;
        }
        .tab-btn:hover { opacity: 1; }
        .tab-btn.active {
            opacity: 1;
            background: var(--bg-featured);
            color: var(--text-inverted);
            font-weight: 400;
        }

        /* --- MAIN WRAPPER --- */
        .main-content-wrapper { margin: 0 auto 50px auto; width: 90%; max-width: 1600px; }

        /* --- CONTROL WRAPPER --- */
        .control-wrapper {
            display: flex;
            justify-content: space-between;
            width: 90%;
            max-width: 1600px;
            margin: 30px auto;
            flex-wrap: wrap;
        }

        /* --- CONTROL BAR --- */
        .control-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 30px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 20px;
        }

        .filter-buttons { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }

        .btn-search-toggle {
            background: transparent; border: 1px solid var(--border-ui);
            color: var(--text-primary); padding: 6px 10px;
            cursor: pointer; transition: all 0.2s; display: flex; align-items: center;
        }
        .btn-search-toggle:hover, .btn-search-toggle.active {
            background: var(--color-brown-dark); color: var(--color-white);
        }
        .btn-search-toggle svg { display: block; }

        .search-row {
            width: 90%; max-width: 1600px; margin: 0 auto 10px auto;
            animation: searchSlide 0.18s ease;
        }
        @keyframes searchSlide {
            from { opacity: 0; transform: translateY(-6px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .search-bar-wrapper { position: relative; max-width: 360px; }
        .search-bar-wrapper input {
            width: 100%; padding: 7px 34px 7px 12px;
            background: transparent; border: 1px solid var(--border-ui);
            color: var(--text-primary); font-family: 'Outfit', sans-serif;
            font-size: 0.9rem; box-sizing: border-box; letter-spacing: 0.3px;
        }
        .search-bar-wrapper input::placeholder { color: var(--color-gray-lighter); }
        .search-bar-wrapper input:focus { outline: none; border-color: var(--color-gold); }
        .search-clear {
            position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
            background: none; border: none; color: var(--color-gray-lighter);
            font-size: 1.1rem; cursor: pointer; padding: 0; line-height: 1; transition: 0.15s;
        }
        .search-clear:hover { color: var(--text-primary); }

        .btn-filter {
            background: transparent;
            border: 1px solid var(--border-ui);
            color: var(--text-primary);
            padding: 6px 15px;
            font-family: 'Outfit', sans-serif;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-filter:hover, .btn-filter.active {
            background: var(--color-brown-dark);
            color: var(--color-white);
        }

        .counter { font-family: 'Outfit', sans-serif; font-weight: 400; font-size: 1rem; }

        /* --- GRID --- */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(10rem, 1fr));
            gap: 2rem 1.5rem;
            padding-bottom: 100px;
        }

        .card { display: flex; flex-direction: column; background: transparent; gap: 12px; }

        .card-image-wrapper {
            position: relative; width: 100%; aspect-ratio: 2/3; overflow: hidden;
            background: var(--color-gray-light); box-shadow: var(--shadow-card);
            transition: transform 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            cursor: pointer;
        }
        .card:hover .card-image-wrapper { transform: translateY(-5px); box-shadow: 0 20px 30px rgba(196, 153, 63, 0.15); }
        .card img { width: 100%; height: 100%; object-fit: cover; display: block; }

        .card-placeholder {
            width: 100%; height: 100%; display: flex; flex-direction: column;
            align-items: center; justify-content: center; padding: 12px; text-align: center;
            background: var(--color-gray-light);
        }
        .card-placeholder .ph-spine {
            font-family: 'Playfair Display', serif; font-style: italic;
            font-size: 0.75rem; line-height: 1.3; color: var(--color-gold);
            word-break: break-word;
        }
        .card-placeholder .ph-author {
            margin-top: 8px; font-size: 0.65rem; color: var(--color-gray-lighter);
        }

        .info {
            position: absolute; inset: 0; background: var(--bg-overlay); padding: 0.75rem;
            display: flex; flex-direction: column; justify-content: flex-end;
            opacity: 0; transition: opacity 0.25s;
        }
        .card-image-wrapper:hover .info { opacity: 1; }

        .info-rating { font-size: 0.85rem; color: var(--color-gold-light); margin-bottom: 4px; }
        .info-date { font-size: 0.7rem; color: var(--color-white-dim); opacity: 0.8; }

        .card-title {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 0.9rem;
            line-height: 1.3;
            margin: 0;
            color: var(--text-primary);
            cursor: pointer;
        }
        .card-title:hover { opacity: 0.75; }
        .card-author {
            font-family: 'Outfit', sans-serif;
            font-size: 0.72rem;
            color: var(--color-gray-lighter);
            margin: 2px 0 0 0;
        }

        /* --- SIDE PANEL --- */
        .panel-overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.5); z-index: 100;
        }
        .panel-overlay.visible { display: block; }

        .side-panel {
            position: fixed; top: 0; right: -520px; width: 480px; max-width: 95vw;
            height: 100vh; background: var(--bg-panel); z-index: 101;
            overflow-y: auto; transition: right 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            box-shadow: var(--shadow-panel);
        }
        .side-panel.open { right: 0; }

        .panel-close {
            position: absolute; top: 18px; right: 20px; background: none; border: none;
            font-size: 1.6rem; cursor: pointer; color: var(--text-panel);
            line-height: 1; padding: 0; transition: opacity 0.2s;
        }
        .panel-close:hover { opacity: 0.5; }

        .panel-cover {
            width: 100%; max-height: 340px; object-fit: cover;
            display: block; background: var(--color-gray-light);
        }
        .panel-cover-placeholder {
            width: 100%; height: 200px; background: var(--color-parchment);
            display: flex; align-items: center; justify-content: center;
            font-size: 3rem; color: var(--color-brown-medium);
        }

        .panel-body { padding: 28px 32px 40px; }

        .panel-meta-row {
            display: flex; gap: 8px; flex-wrap: wrap;
            margin-bottom: 14px; align-items: center;
        }

        .panel-tag {
            font-family: 'Outfit', sans-serif; font-size: 0.7rem;
            text-transform: uppercase; letter-spacing: 0.5px;
            padding: 3px 10px; border: 1px solid var(--border-light);
            color: var(--text-panel); background: transparent;
        }

        .panel-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.7rem; font-weight: 700; font-style: italic;
            margin: 0 0 4px 0; line-height: 1.2; color: var(--text-panel);
        }
        .panel-author {
            font-family: 'Outfit', sans-serif; font-size: 1rem;
            color: var(--color-brown-medium); margin-bottom: 16px;
        }

        .panel-rating-row { display: flex; gap: 20px; margin-bottom: 16px; flex-wrap: wrap; }
        .panel-stat { font-family: 'Outfit', sans-serif; font-size: 0.85rem; color: #555; }
        .panel-stat strong { color: var(--text-panel); }

        .panel-divider { border: none; border-top: 1px solid var(--border-light); margin: 18px 0; }

        .panel-review-label {
            font-family: 'Playfair Display', serif; font-style: italic;
            font-size: 1rem; margin-bottom: 10px; color: var(--color-brown-medium);
        }
        .panel-review {
            font-family: 'Playfair Display', serif;
            font-size: 1rem; line-height: 1.7;
            color: var(--text-panel); white-space: pre-line;
        }
        .panel-review-empty { color: #aaa; font-style: italic; font-size: 0.9rem; }

        .panel-genres { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 12px; }
        .panel-genre-tag {
            font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.5px;
            padding: 2px 8px; background: var(--color-parchment);
            border: 1px solid var(--border-light); color: var(--color-brown-medium);
            font-family: 'Outfit', sans-serif;
        }

        /* Panel editable review */
        .panel-review-edit {
            width: 100%; min-height: 120px; padding: 10px;
            font-family: 'Playfair Display', serif; font-size: 1rem; line-height: 1.7;
            border: 1px solid var(--border-light); background: #fafaf8;
            color: var(--text-panel); resize: vertical; display: none;
        }
        .panel-review-edit:focus { outline: none; border-color: var(--color-gold); }
        .panel-edit-actions { display: none; gap: 10px; margin-top: 10px; }
        .btn-edit {
            background: none; border: 1px solid var(--border-light); padding: 5px 14px;
            font-family: 'Outfit', sans-serif; font-size: 0.75rem; cursor: pointer;
            text-transform: uppercase; letter-spacing: 0.4px; color: var(--text-panel);
            transition: 0.15s;
        }
        .btn-edit:hover { background: var(--color-parchment); }
        .btn-edit.primary { background: var(--color-brown-dark); color: white; border-color: var(--color-brown-dark); }
        .btn-edit.primary:hover { opacity: 0.85; }

        /* Empty state */
        .empty-state {
            text-align: center; padding: 80px 20px;
            font-family: 'Playfair Display', serif; font-style: italic;
            font-size: 1.2rem; color: var(--color-gray-lighter);
        }

        /* Responsive */
        @media (max-width: 600px) {
            .featured-content { flex-direction: column; gap: 24px; }
            .featured-wrapper { padding: 28px; }
            .f-title { font-size: 1.6rem; }
            .side-panel { width: 100%; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="top-nav">
            <a href="analytics.html" class="nav-link">Analytics</a>
        </div>
    </nav>

    <header>
        <h1><a href="index.html">Chaos Book List</a></h1>
    </header>

    <!-- Featured: Most Recently Read -->
    <section class="featured-wrapper" id="featured-section">
        <div class="label-recent">Recently Read</div>
        <div class="featured-content" id="featured-content">
            <p style="font-style:italic; opacity:0.5;">Loading...</p>
        </div>
    </section>

    <!-- Year Tabs -->
    <div style="width:90%; max-width:1600px; margin: 0 auto;">
        <div class="tabs-container" id="tabs-container"></div>
    </div>

    <!-- Search Row -->
    <div class="search-row" id="search-row" style="display:none;">
        <div class="search-bar-wrapper">
            <input type="text" id="search-input" placeholder="Search title or author…">
            <button class="search-clear" id="search-clear" title="Clear">×</button>
        </div>
    </div>

    <!-- Control Bar -->
    <div class="control-wrapper">
        <div class="control-bar" style="width:100%;">
            <div class="filter-buttons" id="filter-buttons">
                <!-- Dynamically populated -->
            </div>
            <div style="display:flex; align-items:center; gap:12px;">
                <span class="counter" id="counter"></span>
                <button class="btn-search-toggle" id="search-toggle" title="Search">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <!-- Book Grid -->
    <div class="main-content-wrapper">
        <div class="grid" id="book-grid"></div>
    </div>

    <!-- Side Panel Overlay -->
    <div class="panel-overlay" id="panel-overlay"></div>

    <!-- Side Panel -->
    <div class="side-panel" id="side-panel">
        <button class="panel-close" id="panel-close">×</button>
        <div id="panel-cover-area"></div>
        <div class="panel-body">
            <div class="panel-meta-row" id="panel-meta-row"></div>
            <h2 class="panel-title" id="panel-title"></h2>
            <p class="panel-author" id="panel-author"></p>
            <div class="panel-rating-row" id="panel-stats"></div>
            <hr class="panel-divider">
            <div class="panel-review-label">My Notes</div>
            <div class="panel-review" id="panel-review"></div>
            <textarea class="panel-review-edit" id="panel-review-edit"></textarea>
            <div class="panel-edit-actions" id="panel-edit-actions">
                <button class="btn-edit primary" id="btn-save">Save</button>
                <button class="btn-edit" id="btn-cancel">Cancel</button>
            </div>
            <div class="panel-genres" id="panel-genres"></div>
        </div>
    </div>

    <script>
        let allBooks = [];
        let activeYear = 'All';
        let activeGenre = 'All';
        let searchQuery = '';
        let openBookIndex = null;

        fetch('books.json')
            .then(r => r.json())
            .then(data => {
                allBooks = data;
                init();
            })
            .catch(() => {
                document.getElementById('book-grid').innerHTML =
                    '<div class="empty-state">No books.json found. Run build_data.py first.</div>';
            });

        function init() {
            renderFeatured();
            buildYearTabs();
            buildGenreFilters();
            renderGrid();
        }

        /* --- FEATURED --- */
        function renderFeatured() {
            const recent = allBooks.find(b => b.date_sort && b.date_sort !== '0000-00-00') || allBooks[0];
            if (!recent) return;
            const stars = recent.rating > 0 ? '★'.repeat(parseInt(recent.rating)) + '☆'.repeat(5 - parseInt(recent.rating)) : '';
            const coverHtml = recent.cover
                ? `<div class="featured-cover"><img src="${recent.cover}" alt="${recent.title}" loading="lazy"></div>`
                : `<div class="featured-cover-placeholder">📖</div>`;

            document.getElementById('featured-content').innerHTML = `
                ${coverHtml}
                <div class="featured-info">
                    <span class="f-date">${recent.date_display || ''}</span>
                    <h2 class="f-title">${recent.title}</h2>
                    <p class="f-author">${recent.author || ''}</p>
                    ${stars ? `<div class="f-rating">${stars}</div>` : ''}
                    ${recent.review ? `<p class="f-notes">${recent.review.substring(0, 300)}${recent.review.length > 300 ? '…' : ''}</p>` : ''}
                </div>
            `;
        }

        /* --- YEAR TABS --- */
        function buildYearTabs() {
            const years = [...new Set(allBooks.map(b => b.date_sort?.substring(0, 4)).filter(y => y && y !== '0000'))].sort().reverse();
            const container = document.getElementById('tabs-container');
            const all = document.createElement('button');
            all.className = 'tab-btn active';
            all.textContent = 'All';
            all.onclick = () => setYear('All');
            container.appendChild(all);

            years.forEach(y => {
                const btn = document.createElement('button');
                btn.className = 'tab-btn';
                btn.textContent = y;
                btn.onclick = () => setYear(y);
                container.appendChild(btn);
            });
        }

        function setYear(year) {
            activeYear = year;
            document.querySelectorAll('.tab-btn').forEach(b => {
                b.classList.toggle('active', b.textContent === year);
            });
            renderGrid();
        }

        /* --- GENRE FILTERS --- */
        function buildGenreFilters() {
            const genreCounts = {};
            allBooks.forEach(b => {
                (b.genres || []).forEach(g => {
                    genreCounts[g] = (genreCounts[g] || 0) + 1;
                });
            });
            // Show top genres (at least 2 books)
            const topGenres = Object.entries(genreCounts)
                .filter(([, c]) => c >= 2)
                .sort((a, b) => b[1] - a[1])
                .slice(0, 8)
                .map(([g]) => g);

            const container = document.getElementById('filter-buttons');
            container.innerHTML = '';

            const allBtn = document.createElement('button');
            allBtn.className = 'btn-filter active';
            allBtn.textContent = 'All';
            allBtn.onclick = () => setGenre('All');
            container.appendChild(allBtn);

            topGenres.forEach(g => {
                const btn = document.createElement('button');
                btn.className = 'btn-filter';
                btn.textContent = g.replace(/-/g, ' ');
                btn.dataset.genre = g;
                btn.onclick = () => setGenre(g);
                container.appendChild(btn);
            });
        }

        function setGenre(genre) {
            activeGenre = genre;
            document.querySelectorAll('.btn-filter').forEach(b => {
                b.classList.toggle('active',
                    b.textContent.replace(/ /g, '-') === genre || (genre === 'All' && b.textContent === 'All')
                );
            });
            renderGrid();
        }

        /* --- SEARCH --- */
        document.getElementById('search-toggle').addEventListener('click', () => {
            const row = document.getElementById('search-row');
            const btn = document.getElementById('search-toggle');
            const visible = row.style.display !== 'none';
            row.style.display = visible ? 'none' : 'block';
            btn.classList.toggle('active', !visible);
            if (!visible) document.getElementById('search-input').focus();
            else { searchQuery = ''; document.getElementById('search-input').value = ''; renderGrid(); }
        });

        document.getElementById('search-input').addEventListener('input', e => {
            searchQuery = e.target.value.toLowerCase();
            document.getElementById('search-clear').style.display = searchQuery ? 'block' : 'none';
            renderGrid();
        });

        document.getElementById('search-clear').addEventListener('click', () => {
            searchQuery = '';
            document.getElementById('search-input').value = '';
            document.getElementById('search-clear').style.display = 'none';
            renderGrid();
        });

        /* --- RENDER GRID --- */
        function getFiltered() {
            return allBooks.filter(b => {
                const yearOk = activeYear === 'All' || (b.date_sort && b.date_sort.startsWith(activeYear));
                const genreOk = activeGenre === 'All' || (b.genres || []).includes(activeGenre);
                const searchOk = !searchQuery ||
                    (b.title || '').toLowerCase().includes(searchQuery) ||
                    (b.author || '').toLowerCase().includes(searchQuery);
                return yearOk && genreOk && searchOk;
            });
        }

        function renderGrid() {
            const filtered = getFiltered();
            document.getElementById('counter').textContent = `${filtered.length} book${filtered.length !== 1 ? 's' : ''}`;
            const grid = document.getElementById('book-grid');

            if (filtered.length === 0) {
                grid.innerHTML = '<div class="empty-state">No books found.</div>';
                return;
            }

            grid.innerHTML = filtered.map((book, i) => {
                const idx = allBooks.indexOf(book);
                const stars = book.rating > 0 ? '★'.repeat(parseInt(book.rating)) + '☆'.repeat(5 - parseInt(book.rating)) : '';
                const imgHtml = book.cover
                    ? `<img src="${book.cover}" alt="${book.title}" loading="lazy" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
                       <div class="card-placeholder" style="display:none;">
                           <span class="ph-spine">${book.title}</span>
                           <span class="ph-author">${book.author || ''}</span>
                       </div>`
                    : `<div class="card-placeholder">
                           <span class="ph-spine">${book.title}</span>
                           <span class="ph-author">${book.author || ''}</span>
                       </div>`;

                return `
                <div class="card">
                    <div class="card-image-wrapper" onclick="openPanel(${idx})">
                        ${imgHtml}
                        <div class="info">
                            ${stars ? `<div class="info-rating">${stars}</div>` : ''}
                            <div class="info-date">${book.date_display || ''}</div>
                        </div>
                    </div>
                    <p class="card-title" onclick="openPanel(${idx})">${book.title}</p>
                    <p class="card-author">${book.author || ''}</p>
                </div>`;
            }).join('');
        }

        /* --- SIDE PANEL --- */
        function openPanel(idx) {
            openBookIndex = idx;
            const book = allBooks[idx];

            // Cover
            const coverArea = document.getElementById('panel-cover-area');
            if (book.cover) {
                coverArea.innerHTML = `<img class="panel-cover" src="${book.cover}" alt="${book.title}">`;
            } else {
                coverArea.innerHTML = `<div class="panel-cover-placeholder">📖</div>`;
            }

            // Meta tags (year, pages)
            const metaRow = document.getElementById('panel-meta-row');
            let tags = [];
            if (book.year_published) tags.push(book.year_published);
            if (book.pages) tags.push(`${book.pages} pages`);
            metaRow.innerHTML = tags.map(t => `<span class="panel-tag">${t}</span>`).join('');

            document.getElementById('panel-title').textContent = book.title;
            document.getElementById('panel-author').textContent = book.author || '';

            // Stats
            const statsRow = document.getElementById('panel-stats');
            let statsHtml = '';
            if (book.rating && book.rating !== '0') {
                statsHtml += `<span class="panel-stat"><strong>${'★'.repeat(parseInt(book.rating))}${'☆'.repeat(5 - parseInt(book.rating))}</strong></span>`;
            }
            if (book.date_display) {
                statsHtml += `<span class="panel-stat">Read: <strong>${book.date_display}</strong></span>`;
            }
            statsRow.innerHTML = statsHtml;

            // Review
            renderPanelReview(book);

            // Genres
            const genresEl = document.getElementById('panel-genres');
            genresEl.innerHTML = (book.genres || []).map(g =>
                `<span class="panel-genre-tag">${g.replace(/-/g, ' ')}</span>`
            ).join('');

            // Open
            document.getElementById('side-panel').classList.add('open');
            document.getElementById('panel-overlay').classList.add('visible');
            document.body.classList.add('panel-open');
        }

        function renderPanelReview(book) {
            const reviewEl = document.getElementById('panel-review');
            const editEl = document.getElementById('panel-review-edit');
            const actionsEl = document.getElementById('panel-edit-actions');
            editEl.style.display = 'none';
            actionsEl.style.display = 'none';
            reviewEl.style.display = 'block';

            if (book.review) {
                reviewEl.textContent = book.review;
                reviewEl.className = 'panel-review';
            } else {
                reviewEl.innerHTML = '<span class="panel-review-empty">No notes yet. Click to add.</span>';
            }

            reviewEl.onclick = () => {
                reviewEl.style.display = 'none';
                editEl.value = book.review || '';
                editEl.style.display = 'block';
                actionsEl.style.display = 'flex';
                editEl.focus();
            };
        }

        document.getElementById('btn-save').addEventListener('click', () => {
            if (openBookIndex === null) return;
            const book = allBooks[openBookIndex];
            book.review = document.getElementById('panel-review-edit').value.trim();
            renderPanelReview(book);
            saveBooks();
        });

        document.getElementById('btn-cancel').addEventListener('click', () => {
            if (openBookIndex === null) return;
            renderPanelReview(allBooks[openBookIndex]);
        });

        function saveBooks() {
            // In a static site, changes are in-memory only.
            // To persist, copy the JSON output and update books.json manually.
            console.log('Updated books data:', JSON.stringify(allBooks, null, 2));
        }

        function closePanel() {
            document.getElementById('side-panel').classList.remove('open');
            document.getElementById('panel-overlay').classList.remove('visible');
            document.body.classList.remove('panel-open');
            openBookIndex = null;
        }

        document.getElementById('panel-close').addEventListener('click', closePanel);
        document.getElementById('panel-overlay').addEventListener('click', closePanel);
        document.addEventListener('keydown', e => { if (e.key === 'Escape') closePanel(); });
    </script>
</body>
</html>
